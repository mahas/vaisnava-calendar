<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="shortcut icon" href="https://mahasoftware.fr/vaisnavacalendar/favicon.png">  
  <link rel="apple-touch-icon" href="https://mahasoftware.fr/vaisnavacalendar/favicon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Calendario Vaisnava">  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d2138">

  <meta property="og:title" content="Calendario Vaisnava">
  <meta property="og:description" content="Calendario vaisnava con ekādaśī, ayunos y eventos espirituales.">
  <meta property="og:image" content="https://mahasoftware.fr/vaisnavacalendar/og-image.png">
  <meta property="og:url" content="https://mahasoftware.fr/vaisnavacalendar/">
  <meta property="og:type" content="website">
  
  <title>Calendario Vaisnava</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/app.js" defer></script>
</head>
<body>
  <div class="header-calendario">
    <h1 id="title">Calendario Vaisnava</h1>
    <div class="language-buttons">
      <button onclick="setLanguage('es')">ES</button>
      <button onclick="setLanguage('en')">EN</button>
    </div>
  </div>

  <div class="card">
    <!-- Tabs Navigation -->
    <div class="tabs-navigation">
      <button class="tab-button active" data-tab="tabCalendarContent" id="tabCalendar">Calendario</button>
      <button class="tab-button" data-tab="tabSearchEventsContent" id="tabSearchEvents">Buscar Evento</button>
    </div>

    <!-- Common City Selection -->
    <h2 id="searchCityLabel">Buscar ciudad</h2>
    <div class="autocomplete-container">
      <input id="cityInput" type="text" autocomplete="off" placeholder="Escribe ciudad... ej. Vrindavan" />
      <div id="autocompleteDropdown" class="autocomplete-dropdown"></div>
    </div>

    <h2 id="selectedCityLabel">Ciudad seleccionada</h2>
    <div id="selected" class="selected-city">Ninguna ciudad seleccionada</div>
    <button id="saveDefaultBtn" onclick="guardarCiudadPorDefecto()" style="display:none; margin-bottom: 16px;">
      Fijar por defecto
    </button>

    <!-- Tab 1: Generate Calendar -->
    <div id="tabCalendarContent" class="tab-content active">
      <h2 id="generateLabel">Calendario</h2>
      
      <label class="custom-checkbox">
        <input type="checkbox" id="soloAyunos" onchange="renderCalendar()" />
        <span class="checkmark"></span>
        <span id="fastFilterText">Mostrar solo días de ayuno</span>
      </label>   

      <!-- Presets -->
      <div class="presets-container">
        <button onclick="applyPreset('thisMonth')" id="btnPresetThisMonth" class="secondary">Este Mes</button>
        <button onclick="applyPreset('nextMonth')" id="btnPresetNextMonth" class="secondary">Mes Siguiente</button>
        <button onclick="applyPreset('thisYear')" id="btnPresetThisYear" class="secondary">Este Año</button>
      </div>

      <div class="date-pickers-container">
        <div class="date-field">
          <label id="startDateLabel">Fecha inicio</label>
          <input id="startDate" type="date" />
        </div>
        <div class="date-field">
          <label id="endDateLabel">Fecha fin</label>
          <input id="endDate" type="date" />
        </div>
      </div>

      <div style="display: flex; gap: 8px; flex-wrap: wrap;">
        <button onclick="generarCalendario()" id="generateBtn">Generar Calendario</button>
        <button onclick="mostrarHoy()" id="todayBtn" class="secondary">Hoy</button>
        <button onclick="exportarICS()" id="exportBtn" class="secondary">Descargar .ics</button>
      </div>

      <!-- Custom ICS Export Settings -->
      <div class="export-settings-btn" id="toggleExportSettings">Ajustes de Exportación (.ics) ⚙️</div>
      <div class="export-settings-panel" id="exportSettingsPanel">
        <label class="custom-checkbox">
          <input type="checkbox" id="icsIncludeAlarms" checked />
          <span class="checkmark"></span>
          <span id="labelIncludeAlarms">Incluir alarmas de ayuno</span>
        </label>
        <div style="margin-bottom: 12px; display: flex; align-items: center; gap: 10px;">
          <span id="labelAlarmHours" style="font-size:14px; color: var(--color-text-muted);">Anticipación de alarma</span>
          <select id="icsAlarmHours" class="alarm-time-select">
            <option value="0" id="optAlarm0">Mismo día</option>
            <option value="12" id="optAlarm12">12 horas antes</option>
            <option value="15" id="optAlarm15" selected>15 horas antes</option>
            <option value="24" id="optAlarm24">1 día antes</option>
          </select>
        </div>
        <label class="custom-checkbox">
          <input type="checkbox" id="icsOnlyFasts" />
          <span class="checkmark"></span>
          <span id="labelOnlyFastsExport">Exportar solo días de ayuno</span>
        </label>
      </div>

      <!-- View layout selector -->
      <div class="view-controls">
        <h2 id="resultLabel" style="margin: 0; border: none; padding: 0;">Fechas Generadas</h2>
        <div class="view-selector">
          <button id="btnListView" class="active" onclick="setCalendarView('list')">Lista</button>
          <button id="btnGridView" onclick="setCalendarView('grid')">Cuadrícula</button>
        </div>
      </div>
      
      <div id="calendarOutput"></div>
    </div>

    <!-- Tab 2: Search Events -->
    <div id="tabSearchEventsContent" class="tab-content">
      <h2 id="searchQueryLabel">Nombre del evento</h2>
      <input id="searchQueryInput" type="text" placeholder="Escribe el nombre del evento... ej. sat tila" />

      <div style="margin-bottom: 16px; display: flex; align-items: center; gap: 10px;">
        <span id="searchCountLabel" style="font-size:14px; color: var(--color-text-muted);">Ocurrencias</span>
        <select id="searchCountSelect" class="alarm-time-select">
          <option value="5">5</option>
          <option value="10">10</option>
          <option value="15">15</option>
          <option value="20">20</option>
        </select>
      </div>

      <button onclick="buscarEventoSiguiente()" id="searchEventBtn" style="margin-bottom: 20px;">
        Buscar Próximas Fechas
      </button>

      <div id="searchResultsOutput"></div>
    </div>
  </div>

  <!-- Detailed Modal Dialog -->
  <dialog id="dayDetailModal" closedby="any" aria-labelledby="modalTitle">
    <div class="modal-header">
      <h3 id="modalTitle">Detalle del Día</h3>
      <button class="modal-close-btn" onclick="document.getElementById('dayDetailModal').close()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="modal-section">
        <span class="modal-section-title" id="modalAstroTitle">Detalles Astrológicos</span>
        <div class="modal-astro-grid" id="modalAstroGrid"></div>
      </div>
      <div class="modal-section">
        <span class="modal-section-title" id="modalEventsTitle">Eventos y Festivales</span>
        <div class="modal-events-list" id="modalEventsList"></div>
      </div>
    </div>
    <div class="modal-footer" id="modalFooter"></div>
  </dialog>

  <!-- Loading Overlay -->
  <div id="loadingOverlay" class="loading-overlay">
    <div class="loading-content">
      <div class="spinner-container">
        <div class="spinner"></div>
      </div>
      <h3 id="loadingTitle">Buscando...</h3>
      <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="timer-text" id="timerText">Tiempo de espera: 0s</div>
      <p class="server-wake-notice" id="serverNoticeText"></p>
    </div>
  </div>
</body>
</html>
