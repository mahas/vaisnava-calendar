<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="shortcut icon" href="https://mahasoftware.fr/vaisnavacalendar/favicon.png">  
    <link rel="apple-touch-icon" href="https://mahasoftware.fr/vaisnavacalendar/favicon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Calendario Vaisnava">  

    <meta property="og:title" content="Calendario Vaisnava">
    <meta property="og:description" content="Calendario vaisnava con ekādaśī, ayunos y eventos espirituales.">
    <meta property="og:image" content="https://mahasoftware.fr/vaisnavacalendar/og-image.png">
    <meta property="og:url" content="https://mahasoftware.fr/vaisnavacalendar/">
    <meta property="og:type" content="website">
  <title>Calendario Vaisnava</title>
  <style>
  * {
    box-sizing: border-box;
  }

  body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    max-width: 980px;
    margin: 0 auto;
    padding: 24px;
    min-height: 100vh;
    background: radial-gradient(circle at top left, #0b1a30, #143550, #1b0a2c, #0b1a30);
    background-size: 200% 200%;
    color: #e0f2fe;
  }

  h1 {
    font-size: 32px;
    margin-bottom: 24px;
    letter-spacing: -1px;
    color: #ffffff;
    text-shadow: 0 0 10px rgba(0, 255, 255, 0.6), 0 0 20px rgba(0, 255, 255, 0.4);
  }

  h2 {
    font-size: 20px;
    margin-top: 28px;
    margin-bottom: 16px;
    color: #f8fafc;
    font-weight: 600;
  }

  .card {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    padding: 28px;
    border-radius: 24px;
    box-shadow: 0 18px 45px rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(255, 255, 255, 0.2);
  }

  input:not([type="checkbox"]) {
    width: 100%;
    max-width: 260px;
    padding: 12px 14px;
    font-size: 16px;
    border: 1px solid rgba(0, 255, 255, 0.3);
    border-radius: 12px;
    background: rgba(0, 0, 0, 0.3);
    color: #ffffff;
    margin: 6px 8px 10px 0;
    backdrop-filter: blur(5px);
    transition: all 0.3s ease;
    color-scheme: dark;
  }

  input:not([type="checkbox"]):focus {
    outline: none;
    border-color: #00ffff;
    box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
    background: rgba(0, 0, 0, 0.5);
    color: #ffffff;
  }

  button {
    padding: 12px 18px;
    font-size: 15px;
    font-weight: 600;
    border: 1px solid rgba(0, 200, 255, 0.5);
    border-radius: 20px;
    background: linear-gradient(135deg, rgba(0, 180, 255, 0.2), rgba(0, 100, 255, 0.2));
    color: white;
    cursor: pointer;
    margin: 6px 8px 10px 0;
    transition: all 0.2s ease;
    backdrop-filter: blur(5px);
  }

  button:hover {
    background: linear-gradient(135deg, rgba(0, 200, 255, 0.4), rgba(0, 120, 255, 0.4));
    box-shadow: 0 0 15px rgba(0, 200, 255, 0.5);
    transform: translateY(-2px);
    border-color: #00ffff;
  }

  button:active {
    transform: translateY(0);
  }

  label {
    display: block;
    font-weight: 500;
    margin-top: 14px;
    margin-bottom: 4px;
    color: #bae6fd;
  }

  /* Custom Checkbox */
  .custom-checkbox {
    display: flex;
    align-items: center;
    position: relative;
    cursor: pointer;
    font-size: 16px;
    user-select: none;
    margin-top: 14px;
    margin-bottom: 20px;
    color: #ffffff;
  }

  .custom-checkbox input {
    position: absolute;
    opacity: 0;
    cursor: pointer;
    height: 0;
    width: 0;
  }

  .checkmark {
    height: 20px;
    width: 20px;
    background-color: rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(0, 255, 255, 0.5);
    border-radius: 6px;
    margin-right: 12px;
    position: relative;
    transition: all 0.2s ease;
  }

  .custom-checkbox:hover input ~ .checkmark {
    box-shadow: 0 0 10px rgba(0, 255, 255, 0.4);
  }

  .custom-checkbox input:checked ~ .checkmark {
    background-color: #00ffff;
    border-color: #00ffff;
    box-shadow: 0 0 15px rgba(0, 255, 255, 0.6);
  }

  .checkmark:after {
    content: "";
    position: absolute;
    display: none;
  }

  .custom-checkbox input:checked ~ .checkmark:after {
    display: block;
  }

  .custom-checkbox .checkmark:after {
    left: 6px;
    top: 2px;
    width: 5px;
    height: 10px;
    border: solid black;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }

  .result {
    margin-top: 16px;
    border-top: 1px solid rgba(255, 255, 255, 0.2);
  }

  .city {
    padding: 14px;
    cursor: pointer;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 10px;
    margin-top: 8px;
    background: rgba(255,255,255, 0.05);
    transition: background 0.2s;
  }

  .city:hover {
    background: rgba(0, 255, 255, 0.1);
    box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
  }

  .selected {
    background: rgba(0, 255, 255, 0.2);
    color: #ffffff;
    font-weight: 700;
    border: 1px solid #00ffff;
  }

  .selected-city {
    background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
    padding: 16px;
    border-radius: 16px;
    font-weight: 500;
    border: 1px solid rgba(255,255,255, 0.2);
    color: #ffffff;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
  }

  #calendarOutput {
    margin-top: 20px;
    background-color: rgba(0, 0, 0, 0.4);
    background-image: radial-gradient(rgba(255, 255, 255, 0.15) 2px, transparent 2px);
    background-size: 16px 16px;
    padding: 18px;
    border-radius: 18px;
    max-width: 100%;
    line-height: 1.55;
    white-space: normal;
    overflow-wrap: break-word;
    word-break: break-word;
    border: 1px solid rgba(255, 255, 255, 0.15);
    box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
    color: #e0f2fe;
  }

  #calendarOutput div,
  .day-item {
    padding: 14px 0;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    white-space: normal;
    overflow-wrap: break-word;
    word-break: break-word;
  }

  #calendarOutput div:last-child,
  .day-item:last-child {
    border-bottom: none;
  }

  .day-item strong,
  #calendarOutput b {
    display: block;
    font-size: 16px;
    margin-bottom: 4px;
    color: #00ffff;
    text-shadow: 0 0 8px rgba(0, 255, 255, 0.4);
  }

  .day-item,
  #calendarOutput small {
    font-size: 14px;
    color: #bae6fd;
  }

  hr {
    border: none;
    border-top: 1px solid rgba(255, 255, 255, 0.2);
    margin: 24px 0;
  }

  @media (max-width: 700px) {
    body {
      padding: 16px;
      margin-top: 0;
    }

    h1 {
      font-size: 28px;
      text-align: center;
    }

    .card {
      padding: 20px;
      border-radius: 20px;
    }

    input:not([type="checkbox"]), button {
      width: 100%;
      max-width: none;
      margin-right: 0;
    }

    .header-calendario {
      padding: 0;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .date-pickers-container {
      flex-direction: column;
      gap: 8px;
    }

    .date-field {
      width: 100%;
    }
  }
  
  .header-calendario {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 0 5px;
    margin-bottom: 25px;
    margin-top: 10px;
  }
  
  .header-calendario h1 {
    margin: 0;
    border: 1px solid rgba(0, 255, 255, 0.4);
    padding: 10px 20px;
    border-radius: 12px;
    background: rgba(0, 200, 255, 0.1);
  }
  
  .language-buttons {
    display: flex;
    gap: 8px;
    white-space: nowrap;
  }  

  .date-pickers-container {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  
  .date-field {
    flex: 1;
    min-width: 180px;
  }
  
  .date-field input {
    max-width: 100%;
  }
</style>
</head>
<body>
    <div class="header-calendario">
      <h1 id="title">Calendario Vaisnava</h1>
    
      <div class="language-buttons">
        <button onclick="setLanguage('es')">ES</button>
        <button onclick="setLanguage('en')">EN</button>
      </div>
    </div>

  <div class="card">
    <h2 id="searchCityLabel">Buscar ciudad</h2>
    <input id="cityInput" value="Paris" />
    <button id="searchBtn" onclick="buscarCiudad()">Buscar</button>

    <div class="result" id="results"></div>

    <h2 id="selectedCityLabel">Ciudad seleccionada</h2>
    <div id="selected" class="selected-city">Ninguna</div>
    <button id="saveDefaultBtn" onclick="guardarCiudadPorDefecto()" style="display:none;">
    Guardar como ciudad por defecto
    </button>

    <h2 id="generateLabel">Generar calendario</h2>
    <label class="custom-checkbox" id="fastFilterLabel">
      <input type="checkbox" id="soloAyunos" />
      <span class="checkmark"></span>
      <span id="fastFilterText">Mostrar solo días de ayuno</span>
    </label>   

    <div class="date-pickers-container">
      <div class="date-field">
        <label id="startDateLabel">Fecha inicio</label>
        <input id="startDate" type="date" />
      </div>
      <div class="date-field">
        <label id="endDateLabel">Fecha fin</label>
        <input id="endDate" type="date" />
      </div>
    </div>

    <br />
    <button onclick="generarCalendario()"  id="generateBtn">Generar</button>
    <button onclick="mostrarHoy()"  id="todayBtn">Hoy</button>
    <button onclick="exportarICS()"  id="exportBtn">Exportar a calendario (.ics)</button>

    <h2 id="resultLabel">Resultado calendario</h2>
    <pre id="calendarOutput">Esperando...</pre>
  </div>

  <script>
    let selectedCity = null;
    let lastCalendarData = null;
    const IS_LOCAL =
    window.location.hostname === "127.0.0.1" ||
    window.location.hostname === "localhost";

    const BASE_URL = IS_LOCAL
    ? "http://127.0.0.1:8047"
    : "https://vaisnava-calendar.onrender.com";

    window.addEventListener('DOMContentLoaded', () => {
        const tzoffset = (new Date()).getTimezoneOffset() * 60000;
        const localISOTime = (new Date(Date.now() - tzoffset)).toISOString().split('T')[0];
        
        document.getElementById('startDate').value = localISOTime;
        document.getElementById('endDate').value = localISOTime;
        applyTranslations();

        cargarCiudadPorDefecto();
        });

    function cargarCiudadPorDefecto() {
    const saved = localStorage.getItem('gcal_default_city');

    if (!saved) return;

    selectedCity = JSON.parse(saved);

    document.getElementById('selected').innerHTML = `
        ${selectedCity.name}<br>
        <small>${selectedCity.tzname}</small>
    `;

    document.getElementById('cityInput').value = selectedCity.city;
    document.getElementById('saveDefaultBtn').style.display = 'none';

    if (selectedCity) {
    generarCalendario();
    }    
    }    

    async function buscarCiudad() {
      const city = document.getElementById('cityInput').value;
      const url = `${BASE_URL}/find-location?name=${encodeURIComponent(city)}`;

      const response = await fetch(url);
      const data = await response.json();

      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = "";

      const cities = data.EQUALS.concat(data.STARTS, data.CONTAINS);

      cities.forEach((c, index) => {
        const div = document.createElement('div');
        div.className = 'city';
        div.textContent = `${c.city} (${c.country})`;

        div.onclick = () => seleccionarCiudad(c, div);

        resultsDiv.appendChild(div);
      });
    }

    function seleccionarCiudad(city, element) {
    selectedCity = city;

    document.querySelectorAll('.city').forEach(el => el.classList.remove('selected'));
    element.classList.add('selected');

    document.getElementById('selected').innerHTML = `
        ${city.name}<br>
        <small>${city.tzname}</small>
    `;

    document.getElementById('saveDefaultBtn').style.display = 'inline-block';
    }

    function guardarCiudadPorDefecto() {
    if (!selectedCity) return;

    localStorage.setItem('gcal_default_city', JSON.stringify(selectedCity));
    alert(`${selectedCity.name} guardada como ciudad por defecto`);
    }


    async function generarCalendario() {
  if (!selectedCity) {
    alert("Selecciona una ciudad primero");
    return;
  }

  const startDateStr = document.getElementById('startDate').value;
  const endDateStr = document.getElementById('endDate').value;
  
  if (!startDateStr || !endDateStr) {
      alert("Selecciona las fechas de inicio y fin");
      return;
  }

  // Parse dates safely handling timezone issues
  const startParts = startDateStr.split('-');
  const endParts = endDateStr.split('-');
  
  const startLocal = new Date(startParts[0], startParts[1] - 1, startParts[2]);
  const endLocal = new Date(endParts[0], endParts[1] - 1, endParts[2]);

  const year = startLocal.getFullYear();
  const month = startLocal.getMonth() + 1;
  const day = startLocal.getDate();
  
  const diffTime = endLocal.getTime() - startLocal.getTime();
  let period = Math.floor(diffTime / (1000 * 60 * 60 * 24)) + 1;
  
  if (period <= 0) {
      alert("La fecha de fin debe ser igual o posterior a la fecha de inicio");
      return;
  }

  const url = `${BASE_URL}/calendar?city=${encodeURIComponent(selectedCity.city)}&country=${encodeURIComponent(selectedCity.country)}&year=${year}&month=${month}&day=${day}&period=${period}`;

  const response = await fetch(url);
  const data = await response.json();
  lastCalendarData = data;
    let html = "";

    const soloAyunos = document.getElementById('soloAyunos').checked;
    const t = translations[currentLang];

    data.days.forEach(d => {
    if (soloAyunos && !d.fast) return;
    const fecha = new Date(d.date.year, d.date.month - 1, d.date.day)
  .toLocaleDateString(currentLang === "en" ? "en-US" : "es-ES", {
      weekday: "short",
      day: "numeric",
      month: "short"
    });
    const hoy = new Date();
    const esHoy =
    d.date.day === hoy.getDate() &&
    d.date.month === (hoy.getMonth() + 1) &&
    d.date.year === hoy.getFullYear();    

    let linea = `<b>${fecha}${esHoy ? " " + t.todayLabel : ""}</b>`;

    if (d.ekadashiName) {
        linea += ` — Ekādaśī: ${d.ekadashiName}`;
    }

    if (d.fast) {
        linea += ` (Ayuno)`;
    }

    if (d.events && d.events.length > 0) {
      
        const eventos = d.events.map(e => translateEventText(e.text)).join(", ");
        linea += `<br><small>${eventos}</small>`;
    }

    html += `<div style="margin-bottom:10px;">${linea}</div>`;
    });

    document.getElementById('calendarOutput').innerHTML = html;
}

    function exportarICS() {
    if (!lastCalendarData) {
        alert("Primero genera un calendario");
        return;
    }

    function limpiarTexto(texto) {
        return String(texto || "")
        .replace(/\\/g, "\\\\")
        .replace(/\n/g, "\\n")
        .replace(/,/g, "\\,")
        .replace(/;/g, "\\;");
    }

    function fechaICS(d) {
        return `${d.date.year}${String(d.date.month).padStart(2, "0")}${String(d.date.day).padStart(2, "0")}`;
    }

    function fechaSiguienteICS(d) {
        const fecha = new Date(d.date.year, d.date.month - 1, d.date.day);
        fecha.setDate(fecha.getDate() + 1);

        return `${fecha.getFullYear()}${String(fecha.getMonth() + 1).padStart(2, "0")}${String(fecha.getDate()).padStart(2, "0")}`;
    }

    const ahora = new Date().toISOString().replace(/[-:]/g, "").split(".")[0] + "Z";

    let lineas = [
        "BEGIN:VCALENDAR",
        "VERSION:2.0",
        "PRODID:-//GCAL Moderno//Calendario Vaisnava//ES",
        "CALSCALE:GREGORIAN",
        "METHOD:PUBLISH"
    ];

    lastCalendarData.days.forEach((d, index) => {
        if (!(d.fast || (d.events && d.events.length > 0))) return;

        const inicio = fechaICS(d);
        const fin = fechaSiguienteICS(d);

        let titulo = "Evento vaisnava";

        if (d.events && d.events.length > 0) {
        titulo = d.events[0].text;
        }

        if (d.fast && !d.ekadashiName && d.events && d.events.length > 0) {
        titulo = d.events[0].text.replace(", (Fast today)", "").replace("(Fast today)", "").trim();
        }

        if (d.fast && !d.ekadashiName && (!d.events || d.events.length === 0)) {
        titulo = "Ayuno vaisnava";
        }

        if (d.ekadashiName && d.fast) {
            titulo += ` — Ekādaśī: ${d.ekadashiName}`;
        }

        const descripcion = d.events
        ? d.events.map(e => e.text).join(" | ")
        : "";

        lineas.push(
        "BEGIN:VEVENT",
        `UID:gcal-moderno-${inicio}-${index}@local`,
        `DTSTAMP:${ahora}`,
        "X-APPLE-DEFAULT-ALARM:FALSE",
        `DTSTART;VALUE=DATE:${inicio}`,
        `DTEND;VALUE=DATE:${fin}`,
        `SUMMARY:${limpiarTexto(titulo)}`,
        `DESCRIPTION:${limpiarTexto(descripcion)}`
        );

        if (d.fast) {
        lineas.push(
            "BEGIN:VALARM",
            "ACTION:DISPLAY",
            `DESCRIPTION:${limpiarTexto("Ayuno mañana: " + titulo)}`,
            "TRIGGER;RELATED=START:-PT15H",
            "END:VALARM",
            "BEGIN:VALARM",
            "ACTION:DISPLAY",
            `DESCRIPTION:${limpiarTexto("Ayuno hoy: " + titulo)}`,
            "TRIGGER;RELATED=START:PT8H",
            "END:VALARM"
        );
        }

        lineas.push("END:VEVENT");
    });

    lineas.push("END:VCALENDAR");

    const ics = lineas.join("\r\n");

    const blob = new Blob([ics], { type: "text/calendar;charset=utf-8" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "VaisnavaCalendar.ics";
    link.click();
    }

    function mostrarHoy() {
    const tzoffset = (new Date()).getTimezoneOffset() * 60000;
    const localISOTime = (new Date(Date.now() - tzoffset)).toISOString().split('T')[0];

    document.getElementById('startDate').value = localISOTime;
    document.getElementById('endDate').value = localISOTime;

    generarCalendario();
    }    
    
let currentLang = localStorage.getItem("lang") || "es";

const translations = {
  es: {
    title: "Calendario Vaisnava",
    searchCity: "Buscar ciudad",
    searchBtn: "Buscar",
    saveDefaultBtn: "Guardar como ciudad por defecto",
    selectedCity: "Ciudad seleccionada",
    generate: "Generar calendario",
    fastFilter: "Mostrar solo días de ayuno",
    startDate: "Fecha inicio",
    endDate: "Fecha fin",
    generateBtn: "Generar",
    todayBtn: "Hoy",
    exportBtn: "Exportar a calendario (.ics)",
    todayLabel: "(Hoy)",
    result: "Resultado calendario"
  },
  en: {
    title: "Vaishnava Calendar",
    searchCity: "Search city",
    searchBtn: "Search",
    saveDefaultBtn: "Save as default city",
    selectedCity: "Selected city",
    generate: "Generate calendar",
    fastFilter: "Show fasting days only",
    startDate: "Start date",
    endDate: "End date",
    generateBtn: "Generate",
    todayBtn: "Today",
    exportBtn: "Export to calendar (.ics)",
    todayLabel: "(Today)",
    result: "Calendar result"
  }
};

function applyTranslations() {
  const t = translations[currentLang];

  document.getElementById("title").innerText = t.title;
  document.getElementById("searchCityLabel").innerText = t.searchCity;
  document.getElementById("searchBtn").innerText = t.searchBtn;
  document.getElementById("selectedCityLabel").innerText = t.selectedCity;
  document.getElementById("saveDefaultBtn").innerText = t.saveDefaultBtn;
  document.getElementById("generateLabel").innerText = t.generate;

  document.getElementById("fastFilterText").innerText = t.fastFilter;

  document.getElementById("startDateLabel").innerText = t.startDate;
  document.getElementById("endDateLabel").innerText = t.endDate;

  document.getElementById("generateBtn").innerText = t.generateBtn;
  document.getElementById("todayBtn").innerText = t.todayBtn;
  document.getElementById("exportBtn").innerText = t.exportBtn;

  document.getElementById("resultLabel").innerText = t.result;
}

function setLanguage(lang) {
  currentLang = lang;
  localStorage.setItem("lang", lang);
  applyTranslations();
}

function translateEventText(text) {
  if (currentLang === "en") return text;

  let t = text;

  // reglas simples
  t = t.replaceAll("Lord ", "Sri ");
  t = t.replaceAll("Appearance", "Aparición");
  t = t.replaceAll("Disappearance", "Desaparición");

  t = t.replaceAll("Fasting for ", "Ayuno por ");
  t = t.replaceAll("Break fast", "Romper ayuno");
  t = t.replaceAll("Fast today", "Ayuno hoy");
  t = t.replaceAll("Fasting is done yesterday", "Ayuno realizado ayer");

  t = t.replaceAll("consort of ", "consorte de ");

  t = t.replaceAll("First day of ", "Primer día de ");
  t = t.replaceAll("Last day of ", "Último día de ");

  t = t.replaceAll("begins", "comienza");
  t = t.replaceAll("ends", "termina");

  t = t.replaceAll("fast for one month", "ayuno por un mes");

  t = t.replaceAll("green leafy vegetable", "vegetales de hoja verde");
  t = t.replaceAll("yogurt", "yogur");
  t = t.replaceAll("milk", "leche");

  return t;
}
  </script>
</body>
</html>
